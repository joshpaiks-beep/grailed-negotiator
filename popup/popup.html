<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grailed Auto-Negotiator</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <section class="hero">
        <p class="eyebrow">Grailed Auto-Negotiator</p>
        <h1>Run smart offer flows without babysitting every listing.</h1>
        <p id="status-banner" class="status-banner" hidden></p>
      </section>

      <!-- Budget Display -->
      <section class="panel budget-panel">
        <div class="budget-bar">
          <div class="budget-info">
            <span class="budget-label">Budget Remaining</span>
            <strong id="budget-remaining">$500</strong>
          </div>
          <div class="budget-meter">
            <div id="budget-fill" class="budget-fill" style="width: 100%"></div>
          </div>
          <div class="budget-meta">
            <span id="budget-used">$0 used</span>
            <span id="budget-max">of $500</span>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Search Setup</h2>
          <button id="refresh-button" class="ghost-button" type="button">Refresh Tab</button>
        </div>
        <form id="config-form" class="config-form">
          <label>
            <span>Brand</span>
            <input id="brand" name="brand" type="text" placeholder="Rick Owens">
          </label>
          <div class="grid-two">
            <label>
              <span>Size</span>
              <input id="size" name="size" type="text" placeholder="M / 32">
            </label>
            <label>
              <span>Category</span>
              <input id="category" name="category" type="text" placeholder="Outerwear">
            </label>
          </div>
          <label>
            <span>Max Price</span>
            <input id="max-price" name="maxPrice" type="number" min="1" step="1" placeholder="250">
          </label>
          <label class="slider-field">
            <div class="slider-header">
              <span>Aggressiveness</span>
              <strong id="aggressiveness-label">Balanced</strong>
            </div>
            <input id="aggressiveness" name="aggressiveness" type="range" min="0" max="100" value="45">
            <div class="slider-scale">
              <span>Chill</span>
              <span>Savage</span>
            </div>
          </label>
          <button id="start-stop-button" class="cta-button" type="submit">Start Negotiation</button>
        </form>
      </section>

      <!-- Pending Approval Section -->
      <section class="panel" id="approvals-panel" hidden>
        <div class="panel-header">
          <h2>⏳ Pending Approval</h2>
          <span id="approval-count" class="count-badge">0</span>
        </div>
        <div id="approvals-list" class="approvals-list"></div>
      </section>

      <!-- Active Offers Section -->
      <section class="panel" id="active-offers-panel" hidden>
        <div class="panel-header">
          <h2>📤 Active Offers</h2>
          <span id="active-offers-count" class="count-badge">0</span>
        </div>
        <div id="active-offers-list" class="active-offers-list"></div>
      </section>

      <section class="panel stats-panel">
        <div class="stats-grid">
          <article>
            <span>Total Savings</span>
            <strong id="stat-savings">$0</strong>
          </article>
          <article>
            <span>Active</span>
            <strong id="stat-active">0</strong>
          </article>
          <article>
            <span>Deals Won</span>
            <strong id="stat-won">0</strong>
          </article>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Activity</h2>
          <div class="stat-pills">
            <span id="pill-offers">0 offers</span>
            <span id="pill-counters">0 counters</span>
          </div>
        </div>
        <div id="activity-feed" class="activity-feed"></div>
      </section>

      <!-- Offer History Section (Collapsible) -->
      <section class="panel">
        <div class="panel-header collapsible" id="history-toggle">
          <h2>📋 Offer History</h2>
          <span class="toggle-icon">▼</span>
        </div>
        <div id="offer-history" class="offer-history" hidden></div>
      </section>

      <footer class="footer">
        <a href="../options/options.html" target="_blank" rel="noreferrer">Settings</a>
      </footer>
    </main>

    <script src="../lib/storage.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
